name: Minecraft Mod Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Schaltet die nervige Node-Warnung für 2026 ab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Code auspacken
      uses: actions/checkout@v4

    - name: Java 21 einrichten
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Gradle automatisch installieren (Weil der Wrapper im Repo fehlt)
      uses: gradle/actions/setup-gradle@v4

    - name: Mod ohne lokalen Wrapper bauen
      run: gradle build
