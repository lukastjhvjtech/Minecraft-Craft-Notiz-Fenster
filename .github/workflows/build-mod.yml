name: Minecraft Mod Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Code auspacken
      uses: actions/checkout@v4

    - name: Java 21 einrichten
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Gradle-Ausführungsrechte vergeben
      run: chmod +x gradlew

    - name: Mod mit Gradle bauen
      run: ./gradlew build

    - name: Fertige JAR-Datei als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: CraftTracker-Mod
        path: build/libs/*.jar
