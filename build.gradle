plugins {
    id 'net.neoforged.moddev' version '1.0.1'
}

version = '1.0.0'
group = 'com.crafttracker'

repositories {
    mavenCentral()
    maven { name = "JEI"; url = "https://maven.blamejared.com/" }
    maven { name = "Create"; url = "https://maven.createmod.net/" }
}

neoForge {
    version = '21.0.2' // Minecraft 1.21 NeoForge-Version

    runs {
        client {
            client()
        }
    }
}

dependencies {
    implementation "mezz.jei:jei-1.21-neoforge:19.0.0.11"
}
